    <div class="sprint-header">
      <span class="sprint-badge ${s.badge}">${s.label}</span>
      <div class="sprint-meta">
        <div class="sprint-title">${s.title}</div>
        <div class="sprint-sub">${s.objective}</div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill ${s.bar}" style="width:${s.progress}%"></div></div>
    <div class="sprint-stats">
      <div class="stat-card"><div class="stat-label">Duration</div><div class="stat-val">${s.time}</div></div>
      <div class="stat-card"><div class="stat-label">Timing</div><div class="stat-val" style="font-size:12px">${s.timing}</div></div>
      <div class="stat-card"><div class="stat-label">Deliverable</div><div class="stat-val" style="font-size:11px">${s.deliverable}</div></div>
    </div>
    <div class="section-title">Models & APIs</div>
    <div class="model-grid">${modelsHtml}</div>
    <div class="section-title">Tasks</div>
    ${tasksHtml}
    <div class="exit-box" style="background:var(--color-background-success);border:0.5px solid var(--color-border-success)">
      <span style="font-size:11px;font-weight:500;color:var(--color-text-success);display:block;margin-bottom:2px">Exit criteria</span>
      <span style="font-size:12px;color:var(--color-text-success)">${s.exit}</span>
    </div>
    ${s.risk ? `<div class="risk-box"><span class="risk-label">Risk & mitigation</span><span style="color:var(--color-text-warning)">${s.risk}</span></div>` : ''}
    <button onclick="sendPrompt('Give me the full Python code for ${s.title}')" style="margin-top:12px;width:100%;font-size:12px;padding:7px">
      Generate code for ${s.label} ↗
    </button>
  `;
  panels.appendChild(panel);
});
</script>
